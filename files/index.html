const {useState,useEffect,useCallback,useMemo,useRef}=React;

// ═══ API Layer ═══
const API=((base="http://127.0.0.1:8000/api")=>{
  let token=localStorage.getItem("mlab_token")||null;
  const headers=()=>({
    "Content-Type":"application/json",
    ...(token&&{"Authorization":`Bearer ${token}`})
  });
  const f=async(ep,opts={})=>{
    const r=await fetch(base+ep,{...opts,headers:{...headers(),...(opts.headers||{})}});
    if(r.status===401){token=null;localStorage.removeItem("mlab_token");throw new Error("Session expired");}
    const ct=r.headers.get("content-type");
    if(ct&&ct.includes("text/csv"))return r.blob();
    if(!r.ok){const e=await r.json().catch(()=>({detail:"Request failed"}));throw new Error(e.detail||"Error");}
    return r.json();
  };
  return{
    login:async(u,p)=>{const d=await f("/auth/login",{method:"POST",body:JSON.stringify({username:u,password:p})});token=d.access_token;localStorage.setItem("mlab_token",token);return d;},
    me:()=>f("/auth/me"),
    logout:()=>{token=null;localStorage.removeItem("mlab_token");},
    inventory:(params={})=>{const q=new URLSearchParams();Object.entries(params).forEach(([k,v])=>{if(v!=null&&v!=="")q.set(k,v)});return f("/inventory?"+q);},
    getItem:id=>f(`/inventory/item/${id}`),
    addItem:d=>f("/inventory",{method:"POST",body:JSON.stringify(d)}),
    updateItem:(id,d)=>f(`/inventory/${id}`,{method:"PUT",body:JSON.stringify(d)}),
    deleteItem:id=>f(`/inventory/${id}`,{method:"DELETE"}),
    useItem:(id,amount,purpose)=>f(`/inventory/${id}/use`,{method:"POST",body:JSON.stringify({amount,purpose})}),
    checkDuplicate:(cat,name,exId)=>{const q=new URLSearchParams();if(cat)q.set("catalog_number",cat);if(name)q.set("name",name);if(exId)q.set("exclude_id",exId);return f("/inventory/check-duplicate?"+q);},
    alerts:()=>f("/inventory/alerts"),
    stats:()=>f("/inventory/stats"),
    catalog:n=>f(`/inventory/catalog/${encodeURIComponent(n)}`),
    activity:(limit=50)=>f(`/activity?limit=${limit}`),
    exportCSV:async()=>{const b=await f("/inventory/export/csv");const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`mehal_lab_${new Date().toISOString().split("T")[0]}.csv`;a.click();URL.revokeObjectURL(u);},
  };
})();

const TYPES=["Antibody","Bacterial Stock","Cell Line","Chemical","Enzyme-Restriction","General","Oligo","Plasmid","Solution","Virus"];
const TCOLORS={"Antibody":"#2563eb","Bacterial Stock":"#16a34a","Cell Line":"#dc2626","Chemical":"#d97706","Enzyme-Restriction":"#059669","General":"#ca8a04","Oligo":"#7c3aed","Plasmid":"#0891b2","Solution":"#6366f1","Virus":"#e11d48"};
const UNITS=["mL","µL","L","mg","µg","g","kg","units","vials","bottles","tubes","plates","boxes","pieces"];
const LOCS=["Freezer 1 > Shelf 1","Freezer 1 > Shelf 2","Freezer 1 > Shelf 3 > F","Freezer 2 > Shelf 1","Freezer 2 > Shelf 2","Freezer 3 > Shelf 1 > A","Freezer 3 > Shelf 2","Freezer 3 > Shelf 3 > F","Cold Room > Shelf 1","Cold Room > Shelf 2","Cold Room > Shelf 3","LN2 Tank 1 > Rack 1","LN2 Tank 1 > Rack 2","Room Temp > Cabinet 1","Room Temp > Cabinet 2","Freezer 1 > Shelf 1 > Enzyme Box"];

function TypeBadge({type}){const c=TCOLORS[type]||"#6b7280";return <span style={{display:"inline-flex",alignItems:"center",gap:6,padding:"3px 10px",borderRadius:20,fontSize:12,fontWeight:600,color:c,background:c+"14"}}><span style={{width:8,height:8,borderRadius:"50%",background:c}}></span>{type}</span>;}

function StockBadge({quantity,minStock,unit}){
  const pct=minStock>0?(quantity/minStock)*100:999;
  if(pct<=50)return <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:700,color:"#dc2626",background:"#fef2f2",border:"1px solid #fecaca"}}>⚠ Critical: {quantity} {unit}</span>;
  if(pct<=100)return <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:700,color:"#d97706",background:"#fffbeb",border:"1px solid #fde68a"}}>⚡ Low: {quantity} {unit}</span>;
  return <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:600,color:"#16a34a",background:"#f0fdf4"}}>✓ {quantity} {unit}</span>;
}

// ═══ LOGIN PAGE ═══
function LoginPage({onLogin}){
  const[u,setU]=useState("");const[p,setP]=useState("");const[err,setErr]=useState("");const[loading,setLoading]=useState(false);

    setLoading(true);setErr("");
    try{await API.login(u,p);const me=await API.me();onLogin(me);}

    catalog_number:item.catalog_number||"",name:item.name,inventory_type:item.inventory_type,vendor:item.vendor||"",location:item.location||"",position:item.position||"",

  const handleChange=(k,v)=>{
    const updated={...form,[k]:v};setForm(updated);
    if(k==="catalog_number"&&v.length>=3){
      clearTimeout(catalogTimer.current);
      catalogTimer.current=setTimeout(async()=>{
        try{const m=await API.catalog(v);setForm(prev=>({...prev,name:m.name,inventory_type:m.inventory_type,vendor:m.vendor,price:m.unit_price,storage_temp:m.storage_temp}));setAutoFill(true);setTimeout(()=>setAutoFill(false),3000);}catch{}
      },400);
    }
    if(k==="catalog_number"||k==="name"){
      clearTimeout(dupTimer.current);
      dupTimer.current=setTimeout(async()=>{
        try{const r=await API.checkDuplicate(updated.catalog_number,updated.name,isEdit?item.id:null);setDupWarn(r.is_duplicate?r:null);}catch{setDupWarn(null);}
      },500);
    }
  };

  const save=async()=>{if(!form.name)return;onSave({...form,price:parseFloat(form.price)||0,quantity:parseFloat(form.quantity)||0,min_stock:parseFloat(form.min_stock)||0},isEdit?item.id:null);};

  const inputStyle={padding:"9px 12px",border:"1.5px solid #cbd5e1",borderRadius:7,fontSize:14,fontFamily:"inherit",outline:"none",background:"#fff",color:"#1a1a2e"};
  const labelStyle={fontSize:12,fontWeight:600,color:"#475569",textTransform:"uppercase",letterSpacing:".5px"};

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.55)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}} onClick={onClose}>
      <div style={{background:"#fff",borderRadius:14,width:"90%",maxWidth:720,maxHeight:"90vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,.2)"}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:"20px 28px 16px",borderBottom:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:"#fff",zIndex:1,borderRadius:"14px 14px 0 0"}}>
          <div style={{fontSize:18,fontWeight:700,color:"#0f172a"}}>{isEdit?"Edit Item":"Add New Item to Inventory"}</div>
          <button style={{width:32,height:32,borderRadius:8,border:"none",background:"#f1f5f9",cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",color:"#64748b"}} onClick={onClose}>✕</button>
        </div>
        <div style={{padding:"20px 28px 28px"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px 20px"}}>
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              <label style={labelStyle}>Catalog Number</label>
              <input style={{...inputStyle,borderColor:autoFill?"#16a34a":"#cbd5e1"}} placeholder="e.g., 9272S, F3165" value={form.catalog_number} onChange={e=>handleChange("catalog_number",e.target.value)} />
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              <label style={labelStyle}>Name *</label>
              <input style={inputStyle} placeholder="Item name" value={form.name} onChange={e=>handleChange("name",e.target.value)} />
            </div>
            {autoFill&&<div style={{gridColumn:"1/-1",padding:"12px 16px",background:"#f0fdf4",border:"1px solid #4ade80",borderRadius:8,color:"#166534",fontSize:13,fontWeight:500}}>✅ Details auto-populated from catalog database</div>}
            {dupWarn&&<div style={{gridColumn:"1/-1",padding:"12px 16px",background:"#fffbeb",border:"1px solid #fbbf24",borderRadius:8,color:"#92400e",fontSize:13,fontWeight:500,display:"flex",alignItems:"flex-start",gap:10}}>
              <span style={{fontSize:20}}>⚠️</span><div><strong>Duplicate Item Detected!</strong><br/><span style={{fontSize:12.5}}>{dupWarn.message}</span></div>
            </div>}
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              <label style={labelStyle}>Inventory Type *</label>
              <select style={{...inputStyle,cursor:"pointer"}} value={form.inventory_type} onChange={e=>handleChange("inventory_type",e.target.value)}>{TYPES.map(t=><option key={t}>{t}</option>)}</select>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:5}}><label style={labelStyle}>Vendor</label><input style={inputStyle} value={form.vendor} onChange={e=>handleChange("vendor",e.target.value)} /></div>
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              <label style={labelStyle}>Location</label>
              <select style={{...inputStyle,cursor:"pointer"}} value={form.location} onChange={e=>handleChange("location",e.target.value)}><option value="">-- Select --</option>{LOCS.map(l=><option key={l}>{l}</option>)}</select>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:5}}><label style={labelStyle}>Position / Box</label><input style={inputStyle} placeholder="e.g., A1, Slot 3" value={form.position} onChange={e=>handleChange("position",e.target.value)} /></div>
            <div style={{display:"flex",flexDirection:"column",gap:5}}><label style={labelStyle}>Price ($)</label><input style={inputStyle} type="number" step="0.01" value={form.price} onChange={e=>handleChange("price",e.target.value)} /></div>
            <div style={{display:"flex",gap:12}}>
              <div style={{display:"flex",flexDirection:"column",gap:5,flex:2}}><label style={labelStyle}>Quantity</label><input style={inputStyle} type="number" step="any" value={form.quantity} onChange={e=>handleChange("quantity",e.target.value)} /></div>
              <div style={{display:"flex",flexDirection:"column",gap:5,flex:1}}><label style={labelStyle}>Unit</label><select style={{...inputStyle,cursor:"pointer"}} value={form.unit} onChange={e=>handleChange("unit",e.target.value)}>{UNITS.map(u=><option key={u}>{u}</option>)}</select></div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:5}}><label style={labelStyle}>Date Received</label><input style={inputStyle} type="date" value={form.date_received} onChange={e=>handleChange("date_received",e.target.value)} /></div>
            <div style={{display:"flex",flexDirection:"column",gap:5}}><label style={labelStyle}>Expiration Date</label><input style={inputStyle} type="date" value={form.expiration_date} onChange={e=>handleChange("expiration_date",e.target.value)} /></div>
            <div style={{display:"flex",flexDirection:"column",gap:5}}><label style={labelStyle}>Storage Temp</label><input style={inputStyle} placeholder="-20°C, 4°C" value={form.storage_temp} onChange={e=>handleChange("storage_temp",e.target.value)} /></div>
            <div style={{display:"flex",flexDirection:"column",gap:5}}><label style={labelStyle}>Min Stock (Low Warning)</label><input style={inputStyle} type="number" step="any" value={form.min_stock} onChange={e=>handleChange("min_stock",e.target.value)} /></div>
            <div style={{display:"flex",flexDirection:"column",gap:5,gridColumn:"1/-1"}}><label style={labelStyle}>Notes</label><textarea style={{...inputStyle,minHeight:60,resize:"vertical"}} value={form.notes} onChange={e=>handleChange("notes",e.target.value)} /></div>
          </div>
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:10,padding:"16px 28px",borderTop:"1px solid #e2e8f0",background:"#f8fafc",borderRadius:"0 0 14px 14px"}}>
          <button style={{padding:"9px 20px",background:"#fff",color:"#334155",border:"1.5px solid #cbd5e1",borderRadius:7,cursor:"pointer",fontWeight:500,fontSize:13,fontFamily:"inherit"}} onClick={onClose}>Cancel</button>
          <button style={{padding:"9px 20px",background:"#00356b",color:"#fff",border:"none",borderRadius:7,cursor:"pointer",fontWeight:600,fontSize:13,fontFamily:"inherit",opacity:!form.name?.5:1}} onClick={save} disabled={!form.name}>{isEdit?"Save Changes":"Add to Inventory"}</button>
        </div>
      </div>
    </div>
  );
}

// ═══ USE / WITHDRAW MODAL ═══
function UseModal({item,onConfirm,onClose}){
  const[amt,setAmt]=useState("");const[purpose,setPurpose]=useState("");
  const rem=item.quantity-(parseFloat(amt)||0);const isOver=rem<0;const isLow=item.min_stock>0&&rem<=item.min_stock;
  const inputStyle={padding:"9px 12px",border:"1.5px solid #cbd5e1",borderRadius:7,fontSize:14,fontFamily:"inherit",outline:"none",background:"#fff"};
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.55)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}} onClick={onClose}>
      <div style={{background:"#fff",borderRadius:14,width:"90%",maxWidth:480,boxShadow:"0 20px 60px rgba(0,0,0,.2)"}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:"20px 28px 16px",borderBottom:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:18,fontWeight:700}}>Withdraw: {item.name}</div>
          <button style={{width:32,height:32,borderRadius:8,border:"none",background:"#f1f5f9",cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onClose}>✕</button>
        </div>
        <div style={{padding:"20px 28px 28px"}}>
          <div style={{marginBottom:16,padding:"12px 16px",background:"#f0f9ff",borderRadius:8,border:"1px solid #bae6fd"}}><strong>Current Stock:</strong> {item.quantity} {item.unit}{item.min_stock>0&&<span style={{color:"#64748b"}}> (Min: {item.min_stock} {item.unit})</span>}</div>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{display:"flex",flexDirection:"column",gap:5}}><label style={{fontSize:12,fontWeight:600,color:"#475569",textTransform:"uppercase"}}>Amount ({item.unit})</label><input style={inputStyle} type="number" step="any" value={amt} onChange={e=>setAmt(e.target.value)} autoFocus /></div>
            <div style={{display:"flex",flexDirection:"column",gap:5}}><label style={{fontSize:12,fontWeight:600,color:"#475569",textTransform:"uppercase"}}>Purpose (optional)</label><input style={inputStyle} placeholder="e.g., Western Blot" value={purpose} onChange={e=>setPurpose(e.target.value)} /></div>
            {amt&&!isOver&&<div style={{padding:"10px 14px",background:"#f8fafc",borderRadius:8,fontSize:13}}>Remaining: <strong>{rem.toFixed(2)} {item.unit}</strong></div>}
            {isOver&&<div style={{padding:"12px 16px",background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:8,color:"#991b1b",fontSize:13}}>🚫 Cannot withdraw more than {item.quantity} {item.unit}</div>}
            {isLow&&!isOver&&parseFloat(amt)>0&&<div style={{padding:"12px 16px",background:"#fffbeb",border:"1px solid #fbbf24",borderRadius:8,color:"#92400e",fontSize:13}}>⚠️ <strong>Low Stock Warning!</strong> Stock will be below minimum ({item.min_stock} {item.unit}). Consider reordering.</div>}
          </div>
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:10,padding:"16px 28px",borderTop:"1px solid #e2e8f0",background:"#f8fafc",borderRadius:"0 0 14px 14px"}}>
          <button style={{padding:"9px 20px",background:"#fff",color:"#334155",border:"1.5px solid #cbd5e1",borderRadius:7,cursor:"pointer",fontWeight:500,fontSize:13,fontFamily:"inherit"}} onClick={onClose}>Cancel</button>
          <button style={{padding:"9px 20px",background:"#16a34a",color:"#fff",border:"none",borderRadius:7,cursor:"pointer",fontWeight:600,fontSize:13,fontFamily:"inherit",opacity:(!amt||isOver)?.5:1}} onClick={()=>onConfirm(parseFloat(amt),purpose)} disabled={!amt||isOver}>Confirm Withdrawal</button>
        </div>
      </div>
    </div>
  );
}

// ═══ MAIN APP ═══
function App(){
  const[user,setUser]=useState(null);const[inventory,setInventory]=useState([]);const[stats,setStats]=useState({total_items:0,in_stock:0,low_stock:0,expired:0,total_value:0});
  const[search,setSearch]=useState("");const[typeFilter,setTypeFilter]=useState([]);const[sortBy,setSortBy]=useState("name");const[sortDir,setSortDir]=useState("asc");
  const[page,setPage]=useState(1);const[totalPages,setTotalPages]=useState(1);const[total,setTotal]=useState(0);
  const[view,setView]=useState("inventory");const[showAdd,setShowAdd]=useState(false);const[editItem,setEditItem]=useState(null);
  const[useItem,setUseItem]=useState(null);const[toast,setToast]=useState(null);const[actLog,setActLog]=useState([]);const[alerts,setAlerts]=useState({low_stock:[],expired:[]});
  const timer=useRef(null);const searchTimer=useRef(null);

  const showToast=(msg,type="success")=>{clearTimeout(timer.current);setToast({msg,type});timer.current=setTimeout(()=>setToast(null),3500);};

  // Auto-login if token exists
  useEffect(()=>{(async()=>{try{const me=await API.me();setUser(me);}catch{API.logout();}})();},[]);

  // Load inventory
  const loadInventory=useCallback(async()=>{
    if(!user)return;
    try{
      const data=await API.inventory({search,inventory_type:typeFilter.join(","),sort_by:sortBy,sort_dir:sortDir,page,per_page:15});
      setInventory(data.items);setTotalPages(data.total_pages);setTotal(data.total);
    }catch(e){showToast(e.message,"error");}
  },[user,search,typeFilter,sortBy,sortDir,page]);

  const loadStats=useCallback(async()=>{if(!user)return;try{setStats(await API.stats());}catch{}},[user]);
  const loadAlerts=useCallback(async()=>{if(!user)return;try{setAlerts(await API.alerts());}catch{}},[user]);
  const loadActivity=useCallback(async()=>{if(!user)return;try{setActLog(await API.activity(50));}catch{}},[user]);

  useEffect(()=>{loadInventory();loadStats();},[loadInventory,loadStats]);
  useEffect(()=>{if(view==="alerts")loadAlerts();if(view==="activity")loadActivity();},[view,loadAlerts,loadActivity]);

  // Debounced search
  const handleSearch=v=>{setSearch(v);setPage(1);};

  const handleSort=field=>{if(sortBy===field)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortBy(field);setSortDir("asc");}};
  const toggleType=t=>{setTypeFilter(prev=>prev.includes(t)?prev.filter(x=>x!==t):[...prev,t]);setPage(1);};

  const handleSave=async(formData,editId)=>{
    try{
      if(editId){await API.updateItem(editId,formData);showToast("Item updated!");}
      else{await API.addItem(formData);showToast("Item added to inventory!");}
      setShowAdd(false);setEditItem(null);loadInventory();loadStats();
    }catch(e){showToast(e.message,"error");}
  };

  const handleUse=async(amount,purpose)=>{
    try{
      const updated=await API.useItem(useItem.id,amount,purpose);
      if(useItem.min_stock>0&&(useItem.quantity-amount)<=useItem.min_stock)showToast(`Low stock: ${useItem.name}`,"warning");
      else showToast(`Withdrew ${amount} ${useItem.unit}`);
      setUseItem(null);loadInventory();loadStats();
    }catch(e){showToast(e.message,"error");}
  };

  const handleDelete=async(item)=>{
    if(!window.confirm(`Remove "${item.name}" from inventory?`))return;
    try{await API.deleteItem(item.id);showToast(`${item.name} removed`,"error");loadInventory();loadStats();}catch(e){showToast(e.message,"error");}
  };

  if(!user)return <LoginPage onLogin={setUser}/>;

  const SortArr=({f})=>sortBy===f?<span style={{marginLeft:4,opacity:.7}}>{sortDir==="asc"?"▲":"▼"}</span>:null;

  // Count items by type from stats (use inventory for sidebar counts)
  const typeCounts={};inventory.forEach(i=>{typeCounts[i.inventory_type]=(typeCounts[i.inventory_type]||0)+1;});

  return(

            <div>Mehal Lab<span style={{fontSize:11,fontWeight:400,opacity:.7,display:"block",marginTop:-2}}>Yale School of Medicine — Inventory</span></div>
          </div>
          <div style={{display:"flex",gap:2}}>
            {["inventory","alerts","activity"].map(v=>(
              <button key={v} style={{padding:"8px 18px",background:view===v?"rgba(255,255,255,.2)":"transparent",border:"none",color:"#fff",borderRadius:6,cursor:"pointer",fontWeight:view===v?600:400,fontSize:13.5,fontFamily:"inherit",textTransform:"capitalize"}} onClick={()=>setView(v)}>
                {v}{v==="alerts"&&(alerts.low_stock.length+alerts.expired.length>0||stats.low_stock+stats.expired>0)&&<span style={{background:"#ef4444",color:"#fff",borderRadius:10,padding:"1px 7px",fontSize:11,fontWeight:700,marginLeft:4}}>{stats.low_stock+stats.expired}</span>}
              </button>
            ))}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <div style={{display:"flex",alignItems:"center",gap:10,color:"#fff"}}>
            <div style={{width:34,height:34,borderRadius:"50%",background:"rgba(255,255,255,.2)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:14,border:"2px solid rgba(255,255,255,.3)"}}>{user.full_name.split(" ").map(n=>n[0]).join("")}</div>
            <div><div style={{fontWeight:600,fontSize:13.5}}>{user.full_name}</div><div style={{fontSize:11,opacity:.7}}>{user.role}</div></div>
          </div>
          <button style={{padding:"6px 14px",background:"rgba(255,255,255,.12)",border:"1px solid rgba(255,255,255,.25)",color:"#fff",borderRadius:6,cursor:"pointer",fontSize:12.5,fontFamily:"inherit"}} onClick={()=>{API.logout();setUser(null);}}>Sign Out</button>
        </div>
      </div>

      <div style={{display:"flex",minHeight:"calc(100vh - 60px)"}}>
        {/* SIDEBAR */}
        <div style={{width:250,background:"#fff",borderRight:"1px solid #e2e8f0",padding:"20px 0",flexShrink:0,overflowY:"auto"}}>
          <div style={{padding:"0 20px",marginBottom:24}}>
            <div style={{fontSize:10.5,fontWeight:700,textTransform:"uppercase",letterSpacing:"1.2px",color:"#64748b",marginBottom:10}}>Inventory Types</div>
            {TYPES.map(type=>(
              <button key={type} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",borderRadius:6,cursor:"pointer",background:typeFilter.includes(type)?`${TCOLORS[type]}12`:"transparent",border:"none",width:"100%",textAlign:"left",fontSize:13,color:typeFilter.includes(type)?TCOLORS[type]:"#475569",fontWeight:typeFilter.includes(type)?600:400,fontFamily:"inherit"}} onClick={()=>toggleType(type)}>
                <span style={{width:10,height:10,borderRadius:"50%",background:TCOLORS[type],flexShrink:0}}></span>{type}
                <span style={{marginLeft:"auto",fontSize:11,color:"#94a3b8"}}>{typeCounts[type]||0}</span>
              </button>
            ))}
            {typeFilter.length>0&&<button style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",borderRadius:6,cursor:"pointer",background:"transparent",border:"none",width:"100%",textAlign:"left",fontSize:12,color:"#2563eb",fontWeight:600,fontFamily:"inherit",marginTop:8}} onClick={()=>{setTypeFilter([]);setPage(1);}}>✕ Clear Filters</button>}
          </div>
          <div style={{padding:"0 20px",marginBottom:24}}>
            <div style={{fontSize:10.5,fontWeight:700,textTransform:"uppercase",letterSpacing:"1.2px",color:"#64748b",marginBottom:10}}>Quick Stats</div>
            <div style={{fontSize:12.5,color:"#475569",display:"flex",flexDirection:"column",gap:8}}>
              {[["Total Items",stats.total_items],["Low Stock",stats.low_stock,"#d97706"],["Expired",stats.expired,"#dc2626"],["Total Value","$"+stats.total_value.toLocaleString("en-US",{minimumFractionDigits:2})]].map(([l,v,c])=>(
                <div key={l} style={{display:"flex",justifyContent:"space-between"}}><span>{l}</span><strong style={{color:c||"inherit"}}>{v}</strong></div>
              ))}
            </div>
          </div>
        </div>

        {/* MAIN */}
        <div style={{flex:1,padding:"24px 28px",overflowX:"auto"}}>
          {view==="inventory"&&<>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:12}}>
              <div style={{fontSize:22,fontWeight:700,color:"#0f172a"}}>Search Inventory</div>
              <div style={{display:"flex",alignItems:"center",background:"#fff",border:"1.5px solid #cbd5e1",borderRadius:8,padding:"0 14px",gap:8,flex:"0 1 380px"}}>
                <span style={{color:"#94a3b8",fontSize:16}}>🔍</span>
                <input style={{border:"none",outline:"none",padding:"10px 0",fontSize:14,flex:1,fontFamily:"inherit",background:"transparent"}} placeholder="Search name, catalog#, vendor, type, location..." value={search} onChange={e=>handleSearch(e.target.value)} />
                {search&&<button style={{border:"none",background:"none",cursor:"pointer",color:"#94a3b8",fontSize:16}} onClick={()=>handleSearch("")}>✕</button>}
              </div>
              <div style={{display:"flex",gap:10}}>
                <button style={{padding:"9px 20px",background:"#00356b",color:"#fff",border:"none",borderRadius:7,cursor:"pointer",fontWeight:600,fontSize:13,fontFamily:"inherit",display:"flex",alignItems:"center",gap:6}} onClick={()=>setShowAdd(true)}>+ Add Item</button>
                <button style={{padding:"9px 20px",background:"#fff",color:"#334155",border:"1.5px solid #cbd5e1",borderRadius:7,cursor:"pointer",fontWeight:500,fontSize:13,fontFamily:"inherit"}} onClick={()=>API.exportCSV().then(()=>showToast("Exported!"))}>↓ Export CSV</button>
              </div>
            </div>

            <div style={{display:"flex",gap:14,marginBottom:22,flexWrap:"wrap"}}>
              {[["Total Items",stats.total_items,"#00356b"],["In Stock",stats.in_stock,"#16a34a"],["Low Stock",stats.low_stock,"#d97706"],["Expired",stats.expired,"#dc2626"]].map(([l,v,c])=>(
                <div key={l} style={{background:"#fff",borderRadius:10,padding:"16px 22px",flex:"1 1 180px",minWidth:160,borderLeft:`4px solid ${c}`,boxShadow:"0 1px 3px rgba(0,0,0,.06)"}}>
                  <div style={{fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:".8px",color:"#64748b",marginBottom:4}}>{l}</div>
                  <div style={{fontSize:26,fontWeight:800,color:v>0&&(l==="Low Stock"||l==="Expired")?c:"#0f172a",letterSpacing:"-1px"}}>{v}</div>
                </div>
              ))}
            </div>

            <table style={{width:"100%",background:"#fff",borderRadius:10,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.07)",borderCollapse:"collapse"}}>
              <thead><tr>
                {[["name","Name"],["location","Location"],["inventory_type","Type"],["price","Price"],["quantity","Quantity"],["date_received","Date Received"]].map(([f,l])=>(
                  <th key={f} style={{textAlign:"left",padding:"12px 16px",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".8px",color:"#475569",background:"#f8fafc",borderBottom:"2px solid #e2e8f0",whiteSpace:"nowrap",cursor:"pointer",userSelect:"none"}} onClick={()=>handleSort(f)}>{l}<SortArr f={f}/></th>
                ))}
                <th style={{textAlign:"left",padding:"12px 16px",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".8px",color:"#475569",background:"#f8fafc",borderBottom:"2px solid #e2e8f0"}}>Actions</th>
              </tr></thead>
              <tbody>
                {inventory.length===0&&<tr><td colSpan={7} style={{padding:40,textAlign:"center",color:"#94a3b8",borderBottom:"1px solid #f1f5f9"}}>No items found.</td></tr>}
                {inventory.map(item=>{
                  const isLow=item.min_stock>0&&item.quantity<=item.min_stock;
                  const isExp=item.expiration_date&&item.expiration_date!=="N/A"&&new Date(item.expiration_date)<new Date();
                  return(
                    <tr key={item.id} style={{background:isExp?"#fef2f2":isLow?"#fffbeb":"transparent",cursor:"pointer",transition:"background .1s"}}>
                      <td style={{padding:"11px 16px",borderBottom:"1px solid #f1f5f9",fontSize:13.5}}><div style={{fontWeight:600,color:"#0f172a"}}>{item.name}</div><div style={{fontSize:11,color:"#94a3b8"}}>Cat# {item.catalog_number||"N/A"}</div></td>
                      <td style={{padding:"11px 16px",borderBottom:"1px solid #f1f5f9",fontSize:12.5}}><div>{item.location||"—"}</div>{item.position&&<div style={{fontSize:11,color:"#94a3b8"}}>{item.position}</div>}</td>
                      <td style={{padding:"11px 16px",borderBottom:"1px solid #f1f5f9"}}><TypeBadge type={item.inventory_type}/></td>
                      <td style={{padding:"11px 16px",borderBottom:"1px solid #f1f5f9",fontSize:13.5}}>{item.price?"$"+item.price.toFixed(2):"—"}</td>
                      <td style={{padding:"11px 16px",borderBottom:"1px solid #f1f5f9"}}><StockBadge quantity={item.quantity} minStock={item.min_stock} unit={item.unit}/></td>
                      <td style={{padding:"11px 16px",borderBottom:"1px solid #f1f5f9",fontSize:13.5}}>{item.date_received||"—"}</td>
                      <td style={{padding:"11px 16px",borderBottom:"1px solid #f1f5f9"}}>
                        <div style={{display:"flex",gap:4}}>
                          <button style={{color:"#16a34a",fontWeight:600,fontSize:12.5,cursor:"pointer",border:"none",background:"none",fontFamily:"inherit",padding:"4px 8px",borderRadius:4}} onClick={()=>setUseItem(item)}>Use</button>
                          <button style={{color:"#00356b",fontWeight:600,fontSize:12.5,cursor:"pointer",border:"none",background:"none",fontFamily:"inherit",padding:"4px 8px",borderRadius:4}} onClick={()=>{setEditItem(item);setShowAdd(true);}}>Edit</button>
                          <button style={{color:"#dc2626",fontWeight:600,fontSize:12.5,cursor:"pointer",border:"none",background:"none",fontFamily:"inherit",padding:"4px 8px",borderRadius:4}} onClick={()=>handleDelete(item)}>✕</button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>

            {totalPages>1&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:16,padding:"12px 16px",background:"#fff",borderRadius:10,boxShadow:"0 1px 3px rgba(0,0,0,.05)"}}>
              <span style={{fontSize:13,color:"#64748b"}}>Showing {((page-1)*15)+1}–{Math.min(page*15,total)} of {total}</span>
              <div style={{display:"flex",gap:6}}>
                <button style={{padding:"6px 14px",border:"1.5px solid #cbd5e1",borderRadius:6,background:page===1?"#f1f5f9":"#fff",color:page===1?"#94a3b8":"#334155",cursor:page===1?"default":"pointer",fontSize:13,fontFamily:"inherit"}} onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1}>← Prev</button>
                {Array.from({length:totalPages},(_,i)=>i+1).slice(Math.max(0,page-3),page+2).map(p=>(
                  <button key={p} style={{padding:"6px 14px",border:"1.5px solid #cbd5e1",borderRadius:6,background:p===page?"#00356b":"#fff",color:p===page?"#fff":"#334155",fontWeight:p===page?700:500,fontSize:13,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>setPage(p)}>{p}</button>
                ))}
                <button style={{padding:"6px 14px",border:"1.5px solid #cbd5e1",borderRadius:6,background:page===totalPages?"#f1f5f9":"#fff",color:page===totalPages?"#94a3b8":"#334155",cursor:page===totalPages?"default":"pointer",fontSize:13,fontFamily:"inherit"}} onClick={()=>setPage(p=>Math.min(totalPages,p+1))} disabled={page===totalPages}>Next →</button>
              </div>
            </div>}
          </>}

          {view==="alerts"&&<>
            <div style={{fontSize:22,fontWeight:700,color:"#0f172a",marginBottom:20}}>Alerts & Warnings</div>
            {alerts.low_stock.length===0&&alerts.expired.length===0&&<div style={{background:"#f0fdf4",border:"1px solid #4ade80",borderRadius:10,padding:30,textAlign:"center",color:"#166534",fontWeight:500}}>✅ No alerts! All inventory levels are healthy.</div>}
            {alerts.expired.length>0&&<div style={{marginBottom:24}}>
              <div style={{fontSize:16,fontWeight:700,color:"#dc2626",marginBottom:12}}>🚫 Expired Items ({alerts.expired.length})</div>
              {alerts.expired.map(item=><div key={item.id} style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,padding:"14px 18px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:600,color:"#991b1b"}}>{item.name}</div><div style={{fontSize:12,color:"#b91c1c"}}>Expired: {item.expiration_date} | Location: {item.location}</div></div></div>)}
            </div>}
            {alerts.low_stock.length>0&&<div>
              <div style={{fontSize:16,fontWeight:700,color:"#d97706",marginBottom:12}}>⚠️ Low Stock ({alerts.low_stock.length})</div>
              {alerts.low_stock.map(item=><div key={item.id} style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:"14px 18px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:600,color:"#92400e"}}>{item.name}</div><div style={{fontSize:12,color:"#a16207"}}>Stock: {item.quantity} {item.unit} (Min: {item.min_stock} {item.unit}) | Vendor: {item.vendor}</div></div></div>)}
            </div>}
          </>}

          {view==="activity"&&<>
            <div style={{fontSize:22,fontWeight:700,color:"#0f172a",marginBottom:20}}>Activity Log</div>
            <div style={{background:"#fff",borderRadius:10,boxShadow:"0 1px 4px rgba(0,0,0,.07)",overflow:"hidden"}}>
              {actLog.length===0&&<div style={{padding:20,color:"#94a3b8",textAlign:"center"}}>No activity yet.</div>}
              {actLog.map(log=>(
                <div key={log.id} style={{padding:"12px 20px",borderBottom:"1px solid #f1f5f9",display:"flex",gap:12,alignItems:"flex-start",fontSize:13}}>
                  <div style={{width:28,height:28,borderRadius:"50%",background:"#e0f2fe",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:11,color:"#0369a1",flexShrink:0}}>{(log.user_name||"?").split(" ").map(n=>n[0]).join("")}</div>
                  <div style={{flex:1}}><span style={{fontWeight:600}}>{log.user_name}</span> <span style={{color:"#64748b"}}>{log.action_description}</span> <span style={{fontWeight:600}}>{log.item_name}</span>{log.detail&&<span style={{color:"#64748b"}}> — {log.detail}</span>}
                    <div style={{fontSize:11,color:"#94a3b8",marginTop:3}}>{log.timestamp?new Date(log.timestamp).toLocaleString():""}</div>
                  </div>
                  <span style={{padding:"2px 8px",borderRadius:4,fontSize:10.5,fontWeight:700,textTransform:"uppercase",
                    background:log.action_type==="add"?"#f0fdf4":log.action_type==="edit"?"#f0f9ff":log.action_type==="use"?"#fffbeb":"#fef2f2",
                    color:log.action_type==="add"?"#16a34a":log.action_type==="edit"?"#2563eb":log.action_type==="use"?"#d97706":"#dc2626"
                  }}>{log.action_type}</span>
                </div>
              ))}
            </div>
          </>}
        </div>
      </div>

      {(showAdd||editItem)&&<ItemModal item={editItem} onSave={handleSave} onClose={()=>{setShowAdd(false);setEditItem(null);}} />}
      {useItem&&<UseModal item={useItem} onConfirm={handleUse} onClose={()=>setUseItem(null)} />}
      {toast&&<div style={{position:"fixed",bottom:28,right:28,padding:"14px 22px",borderRadius:10,color:"#fff",fontWeight:600,fontSize:13.5,zIndex:300,boxShadow:"0 8px 30px rgba(0,0,0,.2)",display:"flex",alignItems:"center",gap:10,animation:"slideUp .3s ease",background:toast.type==="success"?"#16a34a":toast.type==="warning"?"#d97706":"#dc2626"}}>{toast.type==="success"?"✓":toast.type==="warning"?"⚠":"✕"} {toast.msg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
